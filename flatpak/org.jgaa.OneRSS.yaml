app-id: org.jgaa.OneRSS
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk

command: onerss-desktop

finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6

modules:
  - name: libsodium
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/jedisct1/libsodium/releases/download/1.0.22-RELEASE/libsodium-1.0.22.tar.gz
        sha256: adbdd8f16149e81ac6078a03aca6fc03b592b89ef7b5ed83841c086191be3349
  - name: onerss
    buildsystem: simple
    build-commands:
      - |
        cat > /tmp/check-kf6wallet.cmake <<'EOF'
        find_package(KF6Wallet QUIET CONFIG)
        if(NOT KF6Wallet_FOUND)
          message(FATAL_ERROR "KF6Wallet not found")
        endif()
        EOF
        if cmake -P /tmp/check-kf6wallet.cmake >/dev/null 2>&1; then
          kwallet_arg='-DSAFEKEEPING_ENABLE_KWALLET=ON'
        else
          kwallet_arg='-DSAFEKEEPING_ENABLE_KWALLET=OFF'
        fi
        cmake -S . -B _build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/app \
          -DCMAKE_PREFIX_PATH=/app \
          -DONERSS_BUILD_BACKEND=OFF \
          -DONERSS_BUILD_DESKTOP=ON \
          -DONERSS_LOGFAULT_SOURCE_DIR="$(pwd)/third_party/logfault" \
          -DONERSS_QCORO_SOURCE_DIR="$(pwd)/third_party/qcoro" \
          -DONERSS_SAFEKEEPING_SOURCE_DIR="$(pwd)/third_party/safekeeping" \
          "${kwallet_arg}"
      - cmake --build _build --parallel
      - install -Dm755 _build/bin/onerss-desktop /app/bin/onerss-desktop
      - install -Dm644 flatpak/org.jgaa.OneRSS.desktop /app/share/applications/org.jgaa.OneRSS.desktop
      - install -Dm644 flatpak/org.jgaa.OneRSS.png /app/share/icons/hicolor/128x128/apps/org.jgaa.OneRSS.png
      - |
        app_version="$(sed -n 's/^project(OneRSS VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1)"
        sed "s/@VERSION@/${app_version}/g" \
          flatpak/org.jgaa.OneRSS.metainfo.xml.in \
          > org.jgaa.OneRSS.metainfo.xml
      - install -Dm644 org.jgaa.OneRSS.metainfo.xml /app/share/metainfo/org.jgaa.OneRSS.metainfo.xml
    sources:
      - type: dir
        path: ..
      - type: git
        url: https://github.com/qcoro/qcoro.git
        tag: v0.13.0
        dest: third_party/qcoro
      - type: git
        url: https://github.com/jgaa/logfault.git
        tag: v0.8.5
        dest: third_party/logfault
      - type: git
        url: https://github.com/jgaa/SafeKeeping.git
        commit: 635466b1f3508265a13b35489f58849332fde0c1
        dest: third_party/safekeeping
