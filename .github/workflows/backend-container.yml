name: Backend Container

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "proto/**"
      - "Dockerfile.backend"
      - "CMakeLists.txt"
      - "cmake/**"
      - ".github/workflows/backend-container.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-backend-container:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract app version
        id: app_version
        shell: bash
        run: |
          version="$(
            sed -n 's/^project(OneRSS VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1
          )"
          if [[ -z "${version}" ]]; then
            echo "Failed to read app version from CMakeLists.txt" >&2
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Compute image name
        id: image_name
        shell: bash
        run: |
          image_name="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/onerss-backend" | tr '[:upper:]' '[:lower:]')"
          echo "value=${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ steps.image_name.outputs.value }}:latest
            ${{ steps.image_name.outputs.value }}:v${{ steps.app_version.outputs.value }}
            ${{ steps.image_name.outputs.value }}:${{ github.sha }}
