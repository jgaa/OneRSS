name: Release GA

on:
  workflow_dispatch:

jobs:
  release:
    name: Create GA release
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare release metadata
        id: prep
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin main

          app_version="$(sed -n 's/^project(OneRSS VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt | head -n 1)"
          if [ -z "${app_version}" ]; then
            echo "Failed to read VERSION from CMakeLists.txt" >&2
            exit 1
          fi

          tag="v${app_version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          main_sha="$(git rev-parse HEAD)"
          artifact_name="onerss-flatpak-${app_version}"
          bundle_name="onerss-${app_version}.flatpak"
          container_image="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/onerss-backend" | tr '[:upper:]' '[:lower:]')"

          previous_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null)" || previous_tag=""

          {
            echo "app_version=${app_version}"
            echo "tag=${tag}"
            echo "main_sha=${main_sha}"
            echo "artifact_name=${artifact_name}"
            echo "bundle_name=${bundle_name}"
            echo "container_image=${container_image}"
            echo "previous_tag=${previous_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        env:
          PREVIOUS_TAG: ${{ steps.prep.outputs.previous_tag }}
          CONTAINER_IMAGE: ${{ steps.prep.outputs.container_image }}
          APP_VERSION: ${{ steps.prep.outputs.app_version }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          {
            echo "## Changes"
            echo
            if [ -n "${PREVIOUS_TAG}" ]; then
              git log --reverse --format='- %s' "${PREVIOUS_TAG}..HEAD"
            else
              git log --reverse --max-count=20 --format='- %s'
            fi
            echo
            echo "## Backend Container"
            echo
            echo "- \`${CONTAINER_IMAGE}:v${APP_VERSION}\`"
          } > "${notes_file}"

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Find Flatpak artifact for current main
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: ${{ steps.prep.outputs.artifact_name }}
        run: |
          set -euo pipefail

          run_id=""
          artifact_id=""
          while IFS= read -r candidate_run_id; do
            candidate_artifact_id="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}/artifacts" \
                --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" \
                | head -n 1
            )"
            if [ -n "${candidate_artifact_id}" ]; then
              run_id="${candidate_run_id}"
              artifact_id="${candidate_artifact_id}"
              break
            fi
          done < <(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/flatpak.yml/runs?branch=main&event=push&per_page=20" \
              --jq ".workflow_runs[] | select(.conclusion == \"success\") | .id"
          )

          if [ -z "${run_id}" ]; then
            echo "No successful Flatpak workflow run with artifact '${ARTIFACT_NAME}' found on branch 'main'" >&2
            exit 1
          fi

          {
            echo "run_id=${run_id}"
            echo "artifact_id=${artifact_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Download Flatpak artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.artifact.outputs.run_id }}
          ARTIFACT_NAME: ${{ steps.prep.outputs.artifact_name }}
        run: |
          set -euo pipefail

          mkdir -p release-artifact
          gh run download "${RUN_ID}" --name "${ARTIFACT_NAME}" --dir release-artifact

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.prep.outputs.tag }}
          MAIN_SHA: ${{ steps.prep.outputs.main_sha }}
          BUNDLE_NAME: ${{ steps.prep.outputs.bundle_name }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail

          asset_path="release-artifact/${BUNDLE_NAME}"
          if [ ! -f "${asset_path}" ]; then
            echo "Expected asset ${asset_path} was not downloaded" >&2
            exit 1
          fi

          gh release create "${TAG}" "${asset_path}" \
            --target "${MAIN_SHA}" \
            --title "${TAG}" \
            --notes-file "${NOTES_FILE}"
